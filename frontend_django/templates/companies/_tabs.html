{% comment %}Reusable macro for company detail tab navigation{% endcomment %}
{% load static %}
{% with cid=company.company_id %}
<nav class="tab-nav" aria-label="Company sections">

    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>

  <a href="{% url 'companies:competitive_intelligence' cid %}" class="tab-btn {% if active_tab == 'competitive' %}active{% endif %}" id="tab-competitive">

  </a>
