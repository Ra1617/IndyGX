version: "3.9"

services:
  # Company Core Service
  company-core:
    build: ./services/company-core
    container_name: indygx-company-core
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - indygx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Company Profile Service
  company-profile:
    build: ./services/company-profile
    container_name: indygx-company-profile
